<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#4F46E5">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    <link rel="apple-touch-icon" href="assets/images/logo-192.png">
    <!-- Google Fonts + Font Awesome + Dexie + Chart.js + jsPDF + AutoTable + PapaParse + EmailJS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" integrity="sha512-Fo3rlrZj/k7ujTnHg4CGR2D7kSs0v4LLanw2qksYuRlEzO+tcaEPQogQ0KaoGN26/zrn20ImR1DfuLWnOo7aBA==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.js" integrity="sha384-5LZkBlPxG0Q07Z8EZlujnCtwmPjP5sS9/n6Jd/EVy2D/lURFvI7L7sYt5Kz2tPq" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" integrity="sha384-2n7lZv9JFtqzOq+9C47MKRyh0v2Q1g8v7yODTgftqKlH6C7MkQ1NVr3fOq5fU4D" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha512-qZvrmS2ekKPF2mSznTQsxqPgnpkC4J7PL+I4DPId1eEwLgH53T4Wp2zTWBm7HfiKZ/qw/wRDyqF7pJY6WpTY3g==" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js" integrity="sha512-ByrN+kFrJx1EfOJktJp97oY9E0JQ3iBzOqb1BmRltW9UHTk/XcWC7ZfU4zk0r1W1X7bAaWz4s2EOv2OuuqImnQ==" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" integrity="sha512-dsKCkMUH6cXvlOi81k6vEucXwuu1hVFAEuW78QWeHQz2JkY0fPpZuoXKcN2diPOoD9DmFtaZnokVbL1rUPeFFg==" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js" integrity="sha384-4gq7R0KpWJYUl0F9j1T0lXRq5cRjHcZBKuxr+Y2Huk8mPkI6W4ZZMKslKzZFYz3+" crossorigin="anonymous"></script>
    <title id="appTitle">Inventory Manager Pro</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/print.css" media="print">
</head>
<body>

<!-- Activation Overlay (full-screen) -->
<div id="activation-overlay" style="display: none;">
    <div class="activation-card">
        <h2><i class="fas fa-key"></i> Activate Software</h2>
        <p>Enter your unique licence key to continue</p>
        <div class="form-group">
            <label for="business-name">Business Name</label>
            <input type="text" id="business-name" placeholder="Your business name" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="licence-key">Licence Key</label>
            <input type="text" id="licence-key" placeholder="XXXX-XXXX-XXXX-XXXX" autocomplete="off">
        </div>
        <button id="activate-btn" class="btn btn-primary">Activate</button>
        <p id="activation-error" class="text-danger text-sm mt-2" style="display: none;"></p>
    </div>
</div>

<!-- Main App Shell (hidden until activation and login) -->
<div id="app" style="display: none;">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <img id="sidebar-logo" src="assets/images/logo-placeholder.png" alt="Logo" class="logo-img">
                <span id="sidebar-business-name" class="logo-text">Inventory Manager</span>
            </div>
            <button id="sidebar-toggle" class="sidebar-toggle"><i class="fas fa-bars"></i></button>
        </div>
        <nav class="sidebar-nav" id="sidebar-nav">
            <a href="#/dashboard" class="sidebar-nav-item" data-route="dashboard"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a>
            <a href="#/products" class="sidebar-nav-item" data-route="products"><i class="fas fa-boxes"></i> <span>Products</span></a>
            <a href="#/stock/in" class="sidebar-nav-item" data-route="stock"><i class="fas fa-dolly"></i> <span>Stock</span></a>
            <a href="#/categories" class="sidebar-nav-item" data-route="categories"><i class="fas fa-tags"></i> <span>Categories</span></a>
            <a href="#/suppliers" class="sidebar-nav-item" data-route="suppliers"><i class="fas fa-truck"></i> <span>Suppliers</span></a>
            <a href="#/sales/new" class="sidebar-nav-item" data-route="sales"><i class="fas fa-cash-register"></i> <span>Sales</span></a>
            <a href="#/sales" class="sidebar-nav-item" data-route="sales-history"><i class="fas fa-history"></i> <span>Sales History</span></a>
            <a href="#/notifications" class="sidebar-nav-item" data-route="notifications"><i class="fas fa-bell"></i> <span>Notifications</span></a>
            <a href="#/reports/daily-sales" class="sidebar-nav-item" data-route="reports"><i class="fas fa-chart-line"></i> <span>Reports</span></a>
            <a href="#/users" class="sidebar-nav-item" data-route="users" id="users-nav-item" style="display: none;"><i class="fas fa-users"></i> <span>Users</span></a>
            <a href="#/settings" class="sidebar-nav-item" data-route="settings"><i class="fas fa-cog"></i> <span>Settings</span></a>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="main-wrapper">
        <header class="topbar">
            <button id="mobile-menu-toggle" class="mobile-menu-toggle"><i class="fas fa-bars"></i></button>
            <div class="breadcrumb" id="breadcrumb"></div>
            <div class="topbar-right">
                <button id="notification-bell" class="notification-bell">
                    <i class="fas fa-bell"></i>
                    <span id="notif-badge" class="badge-notification">0</span>
                </button>
                <div class="user-menu">
                    <div class="user-avatar" id="user-avatar">A</div>
                    <div class="user-dropdown" id="user-dropdown">
                        <a href="#/profile"><i class="fas fa-user"></i> My Profile</a>
                        <a href="#" id="change-password-nav"><i class="fas fa-key"></i> Change Password</a>
                        <hr>
                        <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
            </div>
        </header>
        <main id="app-content">
            <!-- Dynamic content injected by router -->
            <div class="loading-skeleton">Loading...</div>
        </main>
    </div>
</div>

<!-- Modal Container -->
<div id="modal-container" class="modal-overlay" style="display: none;">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modal-title">Modal Title</h3>
            <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer"></div>
    </div>
</div>

<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>

<!-- Core JS Modules (type="module") -->
<script type="module" src="assets/js/config.js"></script>
<script type="module" src="assets/js/db.js"></script>
<script type="module" src="assets/js/utils.js"></script>
<script type="module" src="assets/js/auth.js"></script>
<script type="module" src="assets/js/ui.js"></script>
<script type="module" src="assets/js/router.js"></script>
<script type="module" src="assets/js/dashboard.js"></script>
<script type="module" src="assets/js/products.js"></script>
<script type="module" src="assets/js/stock.js"></script>
<script type="module" src="assets/js/sales.js"></script>
<script type="module" src="assets/js/categories.js"></script>
<script type="module" src="assets/js/suppliers.js"></script>
<script type="module" src="assets/js/notifications.js"></script>
<script type="module" src="assets/js/reports.js"></script>
<script type="module" src="assets/js/users.js"></script>
<script type="module" src="assets/js/settings.js"></script>
<script type="module" src="assets/js/audit.js"></script>
<script type="module">
    import { initApp } from './assets/js/router.js';
    initApp();
</script>
</body>
</html>
