<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4F46E5">
  <meta name="description" content="Stockify Inventory Management System – Offline-first, zero‑infrastructure inventory for small businesses.">
  <meta name="application-name" content="Stockify Inventory">
  <title>Stockify Inventory</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome 6 Free (pinned, SRI) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-3zZt3FgL0eRvQnK3xG9+J/7N3SqJL4a3bZM1b4bq3lG7l1jDB4W8v5H+0iEG0XMpNq6lFcK55UZJnpGZ4A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/print.css" media="print">
</head>

<body>
  <!-- Offline indicator -->
  <div id="offline-banner" class="offline-banner hidden">
    <i class="fa-solid fa-wifi-slash"></i> You are offline – local data is being used.
  </div>

  <!-- Activation overlay (full screen) -->
  <div id="activation-overlay" class="activation-overlay">
    <div class="activation-card">
      <div class="activation-logo">
        <img src="assets/images/logo-placeholder.png" alt="Stockify" class="logo-img">
        <h1>Stockify Inventory</h1>
        <p class="tagline">Smart inventory, zero infrastructure</p>
      </div>
      <form id="activation-form" novalidate>
        <div class="form-group">
          <label for="business-name-input" class="form-label">Business Name</label>
          <input type="text" id="business-name-input" class="form-input" required placeholder="Your shop name">
        </div>
        <div class="form-group">
          <label for="licence-key-input" class="form-label">Licence Key</label>
          <input type="text" id="licence-key-input" class="form-input" required placeholder="Enter your licence key">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="activate-btn">
          <i class="fa-solid fa-key"></i> Activate
        </button>
      </form>
      <p class="activation-help">
        Need a licence? <a href="https://stockify.example.com" target="_blank" rel="noopener">Purchase one</a>
      </p>
      <div id="activation-error" class="activation-error hidden"></div>
    </div>
  </div>

  <!-- Main application shell (hidden until activated) -->
  <div id="app" class="app-container hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-brand">
        <img src="assets/images/logo-placeholder.png" alt="Logo" class="sidebar-logo">
        <span class="sidebar-brand-text" id="sidebar-app-name">Stockify</span>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Dynamically populated by router based on user role -->
      </nav>
      <div class="sidebar-footer">
        <small class="sidebar-version" id="sidebar-version"></small>
      </div>
    </aside>

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-icon sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="breadcrumb" id="breadcrumb"></div>
      </div>
      <div class="topbar-right">
        <div class="topbar-notifications" id="notification-bell">
          <button class="btn-icon notification-bell-btn">
            <i class="fa-regular fa-bell"></i>
            <span class="badge badge-danger notification-count hidden" id="notif-count"></span>
          </button>
          <div class="notification-dropdown" id="notification-dropdown"></div>
        </div>
        <div class="user-dropdown" id="user-dropdown">
          <button class="btn-icon user-avatar-btn" id="user-avatar-btn">
            <div class="avatar avatar-sm" id="user-avatar-initials"></div>
            <span class="user-name" id="user-name-display"></span>
            <i class="fa-solid fa-chevron-down"></i>
          </button>
          <div class="dropdown-menu" id="user-menu">
            <a href="#/profile" class="dropdown-item"><i class="fa-solid fa-user"></i> My Profile</a>
            <a href="#/change-password" class="dropdown-item"><i class="fa-solid fa-lock"></i> Change Password</a>
            <div class="dropdown-divider"></div>
            <a href="#/logout" class="dropdown-item logout-item"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
          </div>
        </div>
      </div>
    </header>

    <!-- Main content area -->
    <main id="app-content" class="main-content">
      <!-- Dynamic content rendered by router -->
    </main>
  </div>

  <!-- Modal container -->
  <div id="modal-container" class="modal-container hidden">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="btn-icon modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Spinner overlay -->
  <div id="spinner-overlay" class="spinner-overlay hidden">
    <div class="spinner"></div>
  </div>

  <!-- CDN Scripts (pinned versions with SRI) -->
  <!-- Dexie 3.2.6 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dexie/3.2.6/dexie.min.js"
          integrity="sha384-6QJzMq+BztB9OGqZb5U3eXjGs8g/cTlLCPgTBCoV7NpbmFMGtEkbCeA0+Mw9dCU"
          crossorigin="anonymous"></script>
  <!-- Chart.js 4.4.7 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.7/chart.umd.min.js"
          integrity="sha384-Y/Gr1L5Jq/E3iPeYTWwOQfnMtycTq6g3Bkz+1kHkD8HnVpSBBjHjGzH3uJ5p1Z5"
          crossorigin="anonymous"></script>
  <!-- jsPDF 2.5.2 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"
          integrity="sha384-kssBvNcAWJx2/wUcDvZKz9ixXxB5pOynPtdY0q6PrKZhTxpQUNvTHGjJOBJyrgY"
          crossorigin="anonymous"></script>
  <!-- jsPDF-AutoTable 3.8.3 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.3/jspdf.plugin.autotable.min.js"
          integrity="sha384-gX5NyxJqgBpO35o8HeKktB8GJwqGx/6T7O66bX7Z5MlVxZnG0mBT6wIrnJ4hGfG"
          crossorigin="anonymous"></script>
  <!-- PapaParse 5.4.1 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"
          integrity="sha384-kg2Z4GJYpSrYkkh/XNkRMxNRK9kHJ/JOVkV5Q9tLz+DFPpGGB3eCrJxL5m0DPnp"
          crossorigin="anonymous"></script>
  <!-- EmailJS 4.4.1 -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4.4.1/dist/email.min.js"
          integrity="sha384-5e1A0MsmQHkK2L3Ff6cSgh9qA8VrMcF+07XHl/mQtP+Y4PQT7hv6HzA9ChLBOdD"
          crossorigin="anonymous"></script>

  <!-- Application Modules (type="module") -->
  <script type="module" src="config.js"></script>
  <script type="module" src="assets/js/activation.js"></script>
  <script type="module" src="assets/js/db.js"></script>
  <script type="module" src="assets/js/utils.js"></script>
  <script type="module" src="assets/js/ui.js"></script>
  <script type="module" src="assets/js/auth.js"></script>
  <script type="module" src="assets/js/router.js"></script>

  <!-- Feature modules (loaded on demand by router dynamically or preloaded) -->
  <!-- They are listed here as static imports for simplicity, but the router will orchestrate init/destroy -->
  <script type="module" src="assets/js/dashboard.js"></script>
  <script type="module" src="assets/js/products.js"></script>
  <script type="module" src="assets/js/stock.js"></script>
  <script type="module" src="assets/js/sales.js"></script>
  <script type="module" src="assets/js/categories.js"></script>
  <script type="module" src="assets/js/suppliers.js"></script>
  <script type="module" src="assets/js/notifications.js"></script>
  <script type="module" src="assets/js/reports.js"></script>
  <script type="module" src="assets/js/users.js"></script>
  <script type="module" src="assets/js/settings.js"></script>
  <script type="module" src="assets/js/audit.js"></script>

  <!-- Service worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
